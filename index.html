.down { color: #22c55e; }
.blue { color: #60a5fa; }

.chart-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.chart-card.full { grid-column: 1 / -1; }
.chart-card h3 { font-size: 16px; margin-bottom: 12px; color: #f1f5f9; }
.chart-box { width: 100%; height: 400px; }
.chart-box.tall { height: 500px; }
.chart-box.short { height: 350px; }
.table-wrap { padding: 0 24px 40px; max-width: 1400px; margin: 0 auto; }
.table-wrap h3 { font-size: 18px; margin-bottom: 16px; color: #f1f5f9; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #334155; padding: 10px 8px; text-align: left; font-weight: 600; position: sticky; top: 0; white-space: nowrap; }
td { padding: 8px; border-bottom: 1px solid #1e293b; white-space: nowrap; }
tr:hover td { background: #1e293b; }
.tbl-container { max-height: 600px; overflow-y: auto; border-radius: 12px; border: 1px solid #334155; background: #0f172a; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-up { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge-down { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-note { background: rgba(245,158,11,0.15); color: #f59e0b; }
@media (max-width: 768px) {

// ===== 工具函数 =====
const pctColor = v => v > 0 ? '#ef4444' : v < 0 ? '#22c55e' : '#94a3b8';
const fmtPct = v => v == null ? '-' : (v > 0 ? '+' : '') + v.toFixed(2) + '%';

// ===== 统计卡片 =====
function renderStats() {
  const valid = DATA.filter(d => d.debutChg != null);
  const total = DATA.length;
  const upN = valid.filter(d => d.debutChg > 0).length;
  const downN = valid.filter(d => d.debutChg < 0).length;
  const flatN = valid.filter(d => d.debutChg === 0).length;
  const avg = valid.reduce((s, d) => s + d.debutChg, 0) / valid.length;
  const sorted = [...valid].sort((a, b) => a.debutChg - b.debutChg);
  const median = sorted[Math.floor(sorted.length / 2)].debutChg;
  const maxV = Math.max(...valid.map(d => d.debutChg));
  const minV = Math.min(...valid.map(d => d.debutChg));
  const avgOversub = DATA.filter(d => d.oversub).reduce((s, d) => s + d.oversub, 0) / DATA.filter(d => d.oversub).length;
  const avgSR = DATA.filter(d => d.successRate).reduce((s, d) => s + d.successRate, 0) / DATA.filter(d => d.successRate).length;

  const dates = DATA.map(d => d.date).filter(Boolean).sort();
  document.getElementById('dateRange').textContent = `数据范围: ${dates[0]} ~ ${dates[dates.length - 1]}  |  共 ${total} 只 IPO`;

  const cards = [
    { label: 'IPO 总数', value: total, cls: 'blue', sub: `${dates[0]} ~ ${dates[dates.length-1]}` },
    { label: '首日上涨', value: upN, cls: 'up', sub: `${(upN/valid.length*100).toFixed(1)}% 的 IPO 首日上涨` },
    { label: '首日下跌', value: downN, cls: 'down', sub: `${(downN/valid.length*100).toFixed(1)}% 的 IPO 首日破发` },
    { label: '平均首日涨幅', value: avg.toFixed(1) + '%', cls: avg > 0 ? 'up' : 'down', sub: `中位数: ${median.toFixed(1)}%` },
    { label: '最大首日涨幅', value: '+' + maxV.toFixed(1) + '%', cls: 'up', sub: valid.find(d => d.debutChg === maxV).name },
    { label: '最大首日跌幅', value: minV.toFixed(1) + '%', cls: 'down', sub: valid.find(d => d.debutChg === minV).name },
    { label: '平均超额认购', value: avgOversub.toFixed(0) + 'x', cls: 'purple', sub: '超额认购倍数均值' },
    { label: '平均中签率', value: avgSR.toFixed(1) + '%', cls: 'orange', sub: '一手中签率均值' },
  ];

  document.getElementById('statsRow').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls}">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>
  `).join('');
}

// ===== 每月 IPO & 破发率 =====
function renderMonthly() {
  const monthly = {};
  DATA.forEach(d => {
    const m = d.date.substring(0, 7).replace('/', '-');
    if (!monthly[m]) monthly[m] = { count: 0, broke: 0 };
    monthly[m].count++;
    if (d.debutChg != null && d.debutChg < 0) monthly[m].broke++;
  });
  const months = Object.keys(monthly).sort();
  const counts = months.map(m => monthly[m].count);
  const rates = months.map(m => +(monthly[m].broke / monthly[m].count * 100).toFixed(1));

  echarts.init(document.getElementById('chartMonthly')).setOption({
    tooltip: { trigger: 'axis' },
    legend: { data: ['IPO 数量', '破发率'], textStyle: { color: '#94a3b8' } },
    xAxis: { type: 'category', data: months, axisLabel: { color: '#94a3b8' } },
    yAxis: [
      { type: 'value', name: '数量', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
      { type: 'value', name: '破发率(%)', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8', formatter: '{value}%' }, max: 100, splitLine: { show: false } }
    ],
    series: [
      { name: 'IPO 数量', type: 'bar', data: counts, itemStyle: { color: '#60a5fa', borderRadius: [4, 4, 0, 0] }, label: { show: true, position: 'top', color: '#94a3b8' } },
      { name: '破发率', type: 'line', yAxisIndex: 1, data: rates, itemStyle: { color: '#ef4444' }, lineStyle: { width: 3 }, symbol: 'circle', symbolSize: 8, label: { show: true, formatter: '{c}%', color: '#ef4444' } }
    ]
  });
}

// ===== 首日涨跌幅分布 =====
function renderDistribution() {
  const valid = DATA.filter(d => d.debutChg != null).map(d => d.debutChg);
  const min = Math.floor(Math.min(...valid) / 20) * 20;
  const max = Math.ceil(Math.max(...valid) / 20) * 20;
  const bins = [];
  for (let i = min; i < max; i += 20) bins.push({ range: `${i}~${i + 20}%`, low: i, high: i + 20, count: 0 });
  valid.forEach(v => { const b = bins.find(b => v >= b.low && v < b.high); if (b) b.count++; });

  echarts.init(document.getElementById('chartDist')).setOption({
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', data: bins.map(b => b.range), axisLabel: { color: '#94a3b8', rotate: 45, fontSize: 11 } },
    yAxis: { type: 'value', name: '数量', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    series: [{
      type: 'bar', data: bins.map(b => ({
        value: b.count,
        itemStyle: { color: b.low >= 0 ? '#ef4444' : '#22c55e', borderRadius: [4, 4, 0, 0] }
      })),
      label: { show: true, position: 'top', color: '#94a3b8', formatter: p => p.value > 0 ? p.value : '' }
    }]
  });
}

// ===== TOP / BOTTOM 图 =====
function renderTopBottom() {
  const valid = DATA.filter(d => d.debutChg != null);
  const top15 = [...valid].sort((a, b) => b.debutChg - a.debutChg).slice(0, 15).reverse();
  const bot15 = [...valid].sort((a, b) => a.debutChg - b.debutChg).slice(0, 15);

  const makeBar = (id, data, isTop) => {
    echarts.init(document.getElementById(id)).setOption({
      tooltip: { trigger: 'axis', formatter: p => `${p[0].name}<br/>首日涨跌: <b>${p[0].value > 0 ? '+' : ''}${p[0].value}%</b>` },
      grid: { left: 140, right: 60 },
      xAxis: { type: 'value', axisLabel: { color: '#94a3b8', formatter: '{value}%' }, splitLine: { lineStyle: { color: '#1e293b' } } },
      yAxis: { type: 'category', data: data.map(d => d.name + '\n' + d.code), axisLabel: { color: '#cbd5e1', fontSize: 11 } },
      series: [{
        type: 'bar', data: data.map(d => ({
          value: d.debutChg,
          itemStyle: { color: d.debutChg > 0 ? '#ef4444' : '#22c55e', borderRadius: isTop ? [0, 4, 4, 0] : [4, 0, 0, 4] }
        })),
        label: { show: true, position: isTop ? 'right' : 'left', color: '#f1f5f9', formatter: p => (p.value > 0 ? '+' : '') + p.value + '%' }
      }]
    });
  };

  makeBar('chartTop', top15, true);
  makeBar('chartBottom', bot15, false);
}

  echarts.init(document.getElementById('chartSuccess')).setOption({
    tooltip: { formatter: p => `<b>${p.data[2]}</b><br/>中签率: ${p.data[0]}%<br/>首日涨跌: ${p.data[1] > 0 ? '+' : ''}${p.data[1]}%` },
    xAxis: { type: 'value', name: '一手中签率(%)', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { type: 'value', name: '首日涨跌幅(%)', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    series: [{
      type: 'scatter', symbolSize: 10,
      data: data.map(d => [d.successRate, d.debutChg, d.name]),
      itemStyle: { color: p => p.data[1] > 0 ? '#ef4444' : '#22c55e', opacity: 0.8 }
    }]
  });
}

// ===== 首日 vs 累计涨跌 =====
function renderCompare() {
  const sorted = [...DATA].filter(d => d.debutChg != null || d.accChg != null).sort((a, b) => a.date.localeCompare(b.date));
  const names = sorted.map(d => d.name);

  echarts.init(document.getElementById('chartCompare')).setOption({
    tooltip: { trigger: 'axis', formatter: ps => {
      let s = `<b>${ps[0].axisValue}</b><br/>`;
      ps.forEach(p => s += `${p.marker} ${p.seriesName}: ${p.value != null ? (p.value > 0 ? '+' : '') + p.value + '%' : '-'}<br/>`);
      return s;
    } },
    legend: { data: ['首日涨跌幅', '累计涨跌幅'], textStyle: { color: '#94a3b8' } },
    dataZoom: [{ type: 'slider', show: true, start: 0, end: 100, textStyle: { color: '#94a3b8' } }],
    grid: { bottom: 80 },
    xAxis: { type: 'category', data: names, axisLabel: { color: '#94a3b8', rotate: 45, fontSize: 10 } },
    yAxis: { type: 'value', name: '涨跌幅(%)', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
    series: [
      { name: '首日涨跌幅', type: 'bar', data: sorted.map(d => d.debutChg), itemStyle: { color: '#60a5fa' }, barGap: '0%' },
      { name: '累计涨跌幅', type: 'bar', data: sorted.map(d => d.accChg), itemStyle: { color: '#f59e0b' } }
    ]
  });
}

// ===== 数据表 =====
function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = DATA.map(d => {
    const dc = d.debutChg != null ? `<span class="badge ${d.debutChg >= 0 ? 'badge-up' : 'badge-down'}">${fmtPct(d.debutChg)}</span>` : '-';
    const ac = d.accChg != null ? `<span class="badge ${d.accChg >= 0 ? 'badge-up' : 'badge-down'}">${fmtPct(d.accChg)}</span>` : '-';
    const note = d.note ? `<span class="badge badge-note">${d.note}</span>` : '';
    return `<tr>
      <td><b>${d.name}</b></td><td>${d.code}</td><td>${d.date}</td>
      <td>${d.offerPrice ?? '-'}</td><td>${d.listingPrice ?? '-'}</td><td>${d.lastPrice ?? '-'}</td>
      <td>${d.oversub != null ? d.oversub + 'x' : '-'}</td><td>${d.successRate != null ? d.successRate + '%' : '-'}</td>
      <td>${dc}</td><td>${ac}</td><td>${note}</td>
    </tr>`;
  }).join('');
}

// ===== 初始化 =====
renderStats();
renderMonthly();
renderDistribution();
renderTopBottom();
renderScatter();
renderSuccess();
renderCompare();
renderTable();

// 响应式
window.addEventListener('resize', () => {
  document.querySelectorAll('.chart-box').forEach(el => {
    const chart = echarts.getInstanceByDom(el);
    if (chart) chart.resize();
  });
});
</script>
</body>
</html>
